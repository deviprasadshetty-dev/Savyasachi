<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">savyasachi logo</title>
  <desc id="desc">Gold Kannada letter mark with pen nib on deep green background.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#182113"/>
      <stop offset="100%" stop-color="#070b06"/>
    </radialGradient>
    <linearGradient id="gold" x1="24%" y1="10%" x2="82%" y2="92%">
      <stop offset="0%" stop-color="#fff0b5"/>
      <stop offset="45%" stop-color="#e7b84f"/>
      <stop offset="100%" stop-color="#9f7226"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
      <rect width="64" height="64" fill="transparent"/>
      <circle cx="9" cy="13" r="0.7" fill="#ffffff" opacity="0.12"/>
      <circle cx="39" cy="7" r="0.55" fill="#ffffff" opacity="0.1"/>
      <circle cx="55" cy="41" r="0.65" fill="#ffffff" opacity="0.09"/>
      <circle cx="24" cy="52" r="0.5" fill="#000000" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="82" fill="url(#bg)"/>
  <rect width="512" height="512" rx="82" fill="url(#grain)" opacity="0.45"/>
  <g filter="url(#softShadow)">
    <text
      x="243"
      y="332"
      text-anchor="middle"
      font-family="'Noto Sans Kannada', 'Noto Sans Kannada UI', serif"
      font-size="240"
      font-weight="800"
      fill="url(#gold)"
      letter-spacing="-20">ಸ</text>
    <g transform="translate(310 310) rotate(-35)">
      <path d="M0 46 L110 10 L74 120 Z" fill="url(#gold)"/>
      <path d="M30 56 L82 36 L62 88 Z" fill="#070b06" opacity="0.88"/>
      <circle cx="58" cy="62" r="9" fill="#070b06"/>
      <path d="M0 46 L30 56 M74 120 L62 88" stroke="#070b06" stroke-width="7" stroke-linecap="round" opacity="0.82"/>
      <path d="M-18 63 L14 103 M-30 75 L2 115 M-42 87 L-10 127" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
</svg>
